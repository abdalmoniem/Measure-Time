# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Publish Release On Tag
run-name: ${{ github.workflow }} ${{ github.ref_name }} ${{ github.event.repository.updated_at}}

on:
  push:
    tags:
      - "v[0-9]+"
      - "v[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  build:
    name: Build
    secrets: inherit
    uses: ./.github/workflows/build_module.yml

  publish-release-on-tag:
    needs: [build]
    runs-on: windows-latest
    name: Publish Release On Tag
    steps:
      - uses: actions/checkout@v6.0.2
        name: Checkout ${{ github.ref }}
        with:
          fetch-depth: 0

      - id: git-cliff-body-template
        name: Get Git Cliff Body Template
        run: |
          $content = cat -raw cliff_body_ci.tera

          "content<<EOF" >> $env:GITHUB_OUTPUT
          $content >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - id: generate-changelog
        name: Generate Changelog
        uses: orhun/git-cliff-action@v4.7.1
        env:
          BODY_CONTENT: ${{ steps.git-cliff-body-template.outputs.content }}
        with:
          config: cliff.toml
          args: --latest --strip=all --body="$BODY_CONTENT"

      - id: download-artifact
        name: Download Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifact
          name: ${{ needs.build.outputs.artifact_name }}

      - name: Archive Module
        run: |
          $version_name = "${{ github.ref_name }}".Substring(1)
          $version_pattern = "ModuleVersion = .*$"
          $version_substitution = "ModuleVersion = '$version_name'"

          $module_name = "${{ needs.build.outputs.artifact_name }}"
          $module_path = "artifact\$module_name"

          Move-Item -Path artifact\$module_name\0.0.0 -Destination artifact\$module_name\$version_name

          $module_manifest = "$module_path\$version_name\$module_name.psd1"
          $module_manifest_content = $(Get-Content $module_manifest)
          $module_manifest_content -replace $version_pattern, $version_substitution | Set-Content $module_manifest

          Compress-Archive -Path $module_path -DestinationPath "$module_name.zip"

      - name: Publish Release ${{ github.ref_name }}
        uses: svenstaro/upload-release-action@2.11.5
        with:
          draft: false
          promote: true
          overwrite: true
          make_latest: true
          tag: ${{ github.ref }}
          release_name: ${{ github.ref_name }}
          repo_token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          file: ${{ needs.build.outputs.artifact_name }}.zip
          body: ${{ steps.generate-changelog.outputs.content }}
